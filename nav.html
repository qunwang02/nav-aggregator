<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>导航聚合页</title>
    <script>
        // 增强版登录状态检查
        (function() {
            const isAuthenticated = sessionStorage.getItem("authenticated");
            const authTime = sessionStorage.getItem("authTime");
            const sessionToken = sessionStorage.getItem("sessionToken");
            
            // 验证有效期：24 小时
            const AUTH_VALIDITY_HOURS = 24;
            const isValid = isAuthenticated === "true" && 
                           authTime && 
                           (Date.now() - parseInt(authTime) < AUTH_VALIDITY_HOURS * 60 * 60 * 1000);
            
            if (!isValid) {
                // 清除所有认证信息
                sessionStorage.removeItem("authenticated");
                sessionStorage.removeItem("authTime");
                sessionStorage.removeItem("sessionToken");
                // 跳回登录页
                window.location.href = "/";
            }
            
            // 可选：定期刷新认证时间（用户活跃则延长有效期）
            let activityTimer;
            function refreshAuthTime() {
                sessionStorage.setItem("authTime", Date.now());
            }
            
            // 监听用户活动
            ['click', 'touchstart', 'scroll'].forEach(event => {
                document.addEventListener(event, function() {
                    if (activityTimer) clearTimeout(activityTimer);
                    activityTimer = setTimeout(refreshAuthTime, 1000);
                });
            });
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {

        }

        }
        h1 {

            font-weight: 600;

        }

        .section-title {

        }
        .link-list {

        }
        .link-item {

            background: #f9fafb;
            border-radius: 60px;
            padding: 12px 20px;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid #e5e7eb;
        }
        .link-item:hover {

            border-color: #667eea;
            transform: scale(1.02);
        }
        .link-left {

        }
        .link-emoji {

        }
        .link-name {

            color: #1f2937;
        }
        .link-item:hover .link-name {

        }
        .link-arrow {

            font-size: 18px;
        }
        .link-item:hover .link-arrow {
            color: white;
        }
        .via-banner {
            background: #fef3c7;
            border-radius: 20px;
            padding: 14px 18px;
            margin-top: 8px;
            border-left: 4px solid #f59e0b;
        }

        .via-banner a:hover {

        }
        .footer {

            padding-top: 24px;
            margin-top: 8px;
            border-top: 1px solid #f3f4f6;
        }
        .logout {

        }
        .logout a {

        }
        .security-badge {

        }
    </style>
</head>

    <script>
        function logout() {
            if (confirm("确定要退出登录吗？下次访问需要重新输入密码。")) {
                sessionStorage.removeItem("authenticated");
                sessionStorage.removeItem("authTime");
                sessionStorage.removeItem("sessionToken");
                window.location.href = "/";
            }
        }
        
        // 显示登录状态信息（可选）
        const authTime = sessionStorage.getItem("authTime");
        if (authTime) {
            const expireTime = new Date(parseInt(authTime) + 24 * 60 * 60 * 1000);
            console.log(`会话有效期至: ${expireTime.toLocaleString()}`);
        }
    </script>
</body>
</html>
