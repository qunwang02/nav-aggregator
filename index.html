<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>验证访问</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            max-width: 400px;
            width: 100%;
            padding: 40px 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1f2937;
        }
        .sub {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 60px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: #fef2f2;
            padding: 10px;
            border-radius: 12px;
        }
        .warning {
            color: #f59e0b;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: #fffbeb;
            padding: 10px;
            border-radius: 12px;
        }
        .hint {
            color: #9ca3af;
            font-size: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f3f4f6;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="lock-icon">🔐</div>
        <h2>验证访问</h2>
        <div class="sub">请输入密码查看导航页</div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="请输入密码" autocomplete="off">
        </div>
        <button id="submitBtn" onclick="verifyPassword()">确认</button>
        <div class="error" id="errorMsg"></div>
        <div class="warning" id="warningMsg"></div>
        <div class="hint">🔒 请联系管理员获取密码<br>⚠️ 连续5次错误将锁定1小时</div>
    </div>

    <script>
        let lockoutTimer = null;
        
        async function verifyPassword() {
            if (lockoutTimer) clearTimeout(lockoutTimer);
            
            const inputEl = document.getElementById("passwordInput");
            const errorEl = document.getElementById("errorMsg");
            const warningEl = document.getElementById("warningMsg");
            const submitBtn = document.getElementById("submitBtn");
            const password = inputEl.value.trim();
            
            errorEl.style.display = "none";
            warningEl.style.display = "none";
            
            if (!password) {
                errorEl.textContent = "请输入密码";
                errorEl.style.display = "block";
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> 验证中...';
            
            try {
                const response = await fetch("/api/verify", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: password })
                });
                
                const result = await response.json();
                
                if (response.status === 429) {
                    errorEl.textContent = result.message;
                    errorEl.style.display = "block";
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "确认";
                    if (result.remainingLockout) {
                        startLockoutCountdown(result.remainingLockout);
                    }
                } else if (result.success) {
                    // 保存登录状态
                    sessionStorage.setItem("authenticated", "true");
                    sessionStorage.setItem("authTime", Date.now());
                    if (result.sessionToken) {
                        sessionStorage.setItem("sessionToken", result.sessionToken);
                    }
                    // 【关键修改】使用 replace 并添加时间戳，防止缓存问题
                    window.location.replace("/nav.html?t=" + Date.now());
                } else {
                    errorEl.textContent = result.message || "密码错误，请重试";
                    errorEl.style.display = "block";
                    if (result.remainingAttempts !== undefined && result.remainingAttempts <= 2) {
                        warningEl.textContent = `⚠️ 警告：还剩 ${result.remainingAttempts} 次尝试机会，超过将锁定1小时`;
                        warningEl.style.display = "block";
                    }
                    inputEl.value = "";
                    inputEl.focus();
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "确认";
                }
            } catch (error) {
                errorEl.textContent = "网络错误，请稍后重试";
                errorEl.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.innerHTML = "确认";
            }
        }
        
        function startLockoutCountdown(minutes) {
            const submitBtn = document.getElementById("submitBtn");
            let remainingSeconds = minutes * 60;
            const timer = setInterval(() => {
                if (remainingSeconds <= 0) {
                    clearInterval(timer);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "确认";
                } else {
                    const mins = Math.floor(remainingSeconds / 60);
                    const secs = remainingSeconds % 60;
                    submitBtn.innerHTML = `已锁定 ${mins}:${secs.toString().padStart(2, '0')}`;
                    remainingSeconds--;
                }
            }, 1000);
            lockoutTimer = timer;
        }
        
        document.getElementById("passwordInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") verifyPassword();
        });
        
        document.getElementById("passwordInput").focus();
    </script>
</body>
</html>
