<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>聚合跳转中...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            margin: 0 auto 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 14px;
            color: #6b7280;
        }
        .manual-link {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f3f4f6;
            font-size: 13px;
        }
        .manual-link a {
            color: #667eea;
            text-decoration: none;
        }
        .via-tip {
            background: #fef3c7;
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 13px;
            color: #92400e;
        }
        .via-tip a {
            color: #d97706;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="title">正在识别设备，请稍候...</div>
        <div class="desc">自动跳转中，如无反应请点击下方链接</div>
        <div class="manual-link" id="manualLink"></div>
        <div class="via-tip" id="viaTip" style="display:none;">
            💡 强烈建议使用 <a href="https://viayoo.com/zh-cn/" target="_blank">Via浏览器</a> 打开，体验更佳<br>
            <span style="font-size:12px;">↑ 点击下载 Via 浏览器 ↑</span>
        </div>
    </div>

    <script>
        (function() {
            // ========== 配置区域 ==========
            const PC_URL = "https://zh.fosheng.qzz.io/";                    // 电脑版
            const MOBILE_URL = "https://zh.fosheng.qzz.io/mobile.html";    // 手机版
            const VIA_DOWNLOAD_URL = "https://viayoo.com/zh-cn/";           // Via下载页
            // =============================

            const userAgent = navigator.userAgent || "";
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(userAgent);
            
            // 检测是否在 Via 浏览器中
            const isVia = userAgent.toLowerCase().indexOf("via") > -1;
            
            // 目标跳转地址
            let targetUrl = isMobile ? MOBILE_URL : PC_URL;
            
            // 显示手动备用链接
            const manualDiv = document.getElementById("manualLink");
            manualDiv.innerHTML = '如果未自动跳转，请点击：<a href="' + targetUrl + '">' + (isMobile ? "手机版入口" : "电脑版入口") + '</a>';
            
            // Via 提示：仅在手机端且不是 Via 浏览器时显示
            const viaTip = document.getElementById("viaTip");
            if (isMobile && !isVia) {
                viaTip.style.display = "block";
            }
            
            // 延迟跳转（给用户看提示）
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 1500);
        })();
    </script>
</body>
</html>
